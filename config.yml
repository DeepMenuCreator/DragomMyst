# ===================================================
#                 MystPlugin config
# ===================================================

settings:
  # Кулдаун между забором предметов из миста (мс)
  pickup-cooldown-ms: 1000
  # Радиус, в котором нельзя заспавнить мист над мистом
  no-double-spawn-radius: 15
  # Радиус зоны миста (для kd/use/security проверок и голограммы приближения)
  zone-radius: 6

# Шаблоны мистов. Создаются командой /myst create <имя>
# и настраиваются через /myst menu или /myst inventory
myst-types:
  default:
    display-name: "&aОбычный Мист"
    hologram-format: "&e&l{name}"
    hologram-opening-format: "&7Откроется через: &f{time}"
    hologram-open-format: "&aЗакроется через: &f{time}"
    countdown-before-open-seconds: 15
    open-duration-seconds: 300
    security: true
    kd: true
    use: false
    treasure-item: PHANTOM_MEMBRANE
    treasure-name: "&6Сокровище"
    loot:
      - item: DIAMOND
        name: "&bАлмаз"
        min: 1
        max: 3
        weight: 10
      - item: EMERALD
        name: "&aИзумруд"
        min: 1
        max: 2
        weight: 8
      - item: GOLD_INGOT
        name: "&6Золотой слиток"
        min: 1
        max: 5
        weight: 15
      - item: IRON_INGOT
        name: "&fЖелезный слиток"
        min: 2
        max: 8
        weight: 20

# Активные заспавненные мисты сохраняются здесь автоматически
active-mysts: []
